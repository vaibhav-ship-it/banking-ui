<div class="container mt-4">
  <h2>Loan Request Form</h2>
  <h3><span [class]="loanStyle">{{loanStatus}}</span></h3>
  <form [formGroup]="loanForm" (ngSubmit)="onSubmit()">
    <!-- Loan Amount -->
    <div class="form-group">
      <label for="amount">Loan Amount</label>
      <input
        type="number"
        id="amount"
        formControlName="amount"
        class="form-control"
        placeholder="Enter loan amount"
      />
      <div *ngIf="loanForm.get('amount')?.touched && loanForm.get('amount')?.invalid" class="text-danger">
        <div *ngIf="loanForm.get('amount')?.errors?.['required']">
          Loan amount is required.
        </div>
        <div *ngIf="loanForm.get('amount')?.errors?.['min']">
          Loan amount must be at least 100000.
        </div>
      </div>
    </div>

    <!-- Purpose -->
    <div class="form-group mt-3">
      <label for="purpose">Purpose</label>
      <input
        type="text"
        id="purpose"
        formControlName="purpose"
        class="form-control"
        placeholder="Enter purpose"
      />
      <div *ngIf="loanForm.get('purpose')?.touched && loanForm.get('purpose')?.invalid" class="text-danger">
        <div *ngIf="loanForm.get('purpose')?.errors?.['required']">
          Purpose is required.
        </div>
        <div *ngIf="loanForm.get('purpose')?.errors?.['minlength']">
          Purpose must be at least 10 characters.
        </div>
        <div *ngIf="loanForm.get('purpose')?.errors?.['maxlength']">
          Purpose cannot exceed 255 characters.
        </div>
      </div>
    </div>

    <!-- Submit -->
     <div class="mt-3">
      <button type="submit" class="btn btn-primary" [disabled]="loanForm.invalid">
        Submit
      </button>&nbsp;
      <a href="/dashboard" class="btn btn-primary">Back to Dashboard</a>
    </div>
  </form>
</div>
