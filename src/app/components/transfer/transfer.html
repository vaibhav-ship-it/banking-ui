<div class="container mt-4">
  <h2>Transfer Request Form</h2>
  <h3><span [class]="msgStyle">{{transferStatus}}</span> </h3>
  <form [formGroup]="transferForm" (ngSubmit)="onSubmit()">
    <!-- Recipient Account No -->
    <div class="form-group">
      <label for="recipientAccountNo">Recipient Account No</label>
      <input
        type="text"
        id="recipientAccountNo"
        formControlName="recipientAccountNo"
        class="form-control"
        placeholder="Enter recipient account number"
      />
    </div>

    <!-- Amount -->
    <div class="form-group mt-3">
      <label for="amount">Amount</label>
      <input
        type="number"
        id="amount"
        formControlName="amount"
        class="form-control"
        placeholder="Enter amount"
      />
    </div>

    <!-- Description -->
    <div class="form-group mt-3">
      <label for="description">Description</label>
      <textarea
        id="description"
        formControlName="description"
        class="form-control"
        placeholder="Enter description"
      ></textarea>
    </div>

    <!-- Submit -->
    <div class="mt-3">
      <button type="submit" class="btn btn-primary" [disabled]="transferForm.invalid">
        Submit Transfer
      </button>&nbsp;
      <a href="/dashboard" class="btn btn-primary">Back to Dashboard</a>
    </div> 
  </form>
</div>
